name: CatWatch Telegram Alerts

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  catwatch-alerts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser python-dateutil

      - name: Run CatWatch alert checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CATWATCH_MAX_ALERTS: "8"
        run: python alert_checker.py

      - name: Save alert state
        run: |
          if [ -f .catwatch_alert_state.json ]; then
            git config user.name "catwatch-bot"
            git config user.email "catwatch-bot@users.noreply.github.com"
            git add .catwatch_alert_state.json
            if ! git diff --cached --quiet; then
              git commit -m "Update CatWatch alert state"
              git push
            else
              echo "No alert state changes to commit."
            fi
          else
            echo "No alert state file found."
          fi
